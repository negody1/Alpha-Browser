appId: com.alpha.browser
productName: Alpha Browser
# Installed application binary name -> "Alpha Browser.exe".
executableName: Alpha Browser
directories:
  buildResources: resources
  output: release
asar: true
files:
  - out/**/*
  - resources/**/*
  # sing-box is delivered as an external resource (see extraResources), never bundled into the asar.
  - '!resources/bin/**/*'
  # The serialized ABP engine (~13 MB) ships only via extraResources below, not
  # also in the asar — avoids doubling the payload. Runtime reads it from
  # process.resourcesPath/adblock/engine.bin (GhosteryEngine candidates).
  - '!resources/adblock/engine.bin'
extraResources:
  # Copy the proxy binary to <resourcesPath>/bin so it stays outside the asar
  # and remains executable. ProxyClientService.resolveSingBoxPath() reads it
  # from process.resourcesPath/bin in packaged builds.
  - from: resources/bin
    to: bin
    filter:
      - 'sing-box'
      - 'sing-box.exe'
  # Ship the bundled adblock filter list to <resourcesPath>/adblock so it loads
  # in packaged builds. The file is synced into resources/adblock by
  # scripts/sync-adblock-assets.mjs (run in dist:win) from the canonical
  # packages/core-adblock/assets/default-ads.txt. It is ALSO included in the
  # asar via `files: resources/**` above, giving two independent packaged
  # copies. AdblockService.reloadRules() reads from process.resourcesPath/adblock
  # first, then the asar copy, so a release never starts with empty filters.
  - from: resources/adblock
    to: adblock
    filter:
      - 'default-ads.txt'
      # Serialized ABP engine (EasyList/EasyPrivacy/PeterLowe/Fanboy/AdGuard),
      # built by scripts/build-adblock-engine.mjs in dist:win. Loaded by
      # GhosteryEngine.deserialize(); legacy default-ads.txt remains the fallback.
      - 'engine.bin'
win:
  target:
    - nsis
  # Real multi-resolution Windows icon (16/24/32/48/64/128/256) generated from
  # resources/icon.png. NSIS requires a true .ico (not a PNG renamed .ico).
  icon: resources/icon.ico
nsis:
  oneClick: false
  # Install to Program Files for all users (requires UAC elevation).
  perMachine: true
  allowToChangeInstallationDirectory: true
  # Fixed installer filename requested for distribution.
  artifactName: AlphaBrowserSetup.${ext}
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  # Header icon (top-right of the installer) — also a true .ico.
  installerHeaderIcon: resources/icon.ico
  # Branded visuals (Alpha logo on the dark/purple browser wallpaper):
  #  - sidebar  164x314 BMP -> Welcome & Finish pages (big left image)
  #  - header   150x57  BMP -> interior pages (top-right strip)
  installerSidebar: resources/installerSidebar.bmp
  uninstallerSidebar: resources/installerSidebar.bmp
  installerHeader: resources/installerHeader.bmp
  shortcutName: Alpha Browser
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # menuCategory MUST stay false: any value nests BOTH the Start Menu submenu
  # AND the install directory (Program Files\<category>\<productName>), which is
  # what produced "Program Files\Alpha Browser\Alpha Browser". Modern apps
  # (Brave/Arc/Cursor) put the shortcut flat in the Start Menu — matches our look
  # and keeps the install path "Program Files\Alpha Browser".
  menuCategory: false
  runAfterFinish: true
