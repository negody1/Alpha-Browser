<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alpha Access — admin</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; background:#0b0d12; color:#e6e8ee; font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif; padding:24px; }
  h1 { font-size:18px; margin:0 0 12px; }
  .row { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
  input { padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,.14); background:#0d1019; color:#fff; }
  button { padding:7px 12px; border:none; border-radius:8px; cursor:pointer; background:#26304a; color:#fff; }
  button.p { background:linear-gradient(135deg,#7a4dff,#9b6cff); } button.d { background:#5a2330; }
  table { width:100%; border-collapse:collapse; font-size:13px; } th,td { text-align:left; padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.08); }
  th { color:rgba(255,255,255,.5); } .s { padding:2px 8px; border-radius:999px; font-size:12px; }
  .s.pending{background:#4a3a14;color:#ffcf8b}.s.approved{background:#13402a;color:#8be0a8}
  .s.active{background:#1a3352;color:#8ec5ff}.s.denied,.s.revoked{background:#4a1722;color:#ff9aa9}
  .muted { color:rgba(255,255,255,.45); } .card{border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px;max-width:360px;background:#141821}
  .hide{display:none} .err{color:#ff9aa9;min-height:18px}
  details{margin-top:18px} summary{cursor:pointer;color:rgba(255,255,255,.6)}
</style>
</head>
<body>
  <!-- FIRST-RUN SETUP WIZARD (shown only while no admin exists) -->
  <div id="setup" class="hide">
    <h1>Alpha Access — первичная настройка</h1>
    <div class="card">
      <p class="muted" style="margin-top:0">Администратор ещё не создан. Задайте учётные данные — мастер откроется только один раз.</p>
      <div class="row"><input id="su" placeholder="Логин администратора (мин. 3)" autocomplete="username" /></div>
      <div class="row"><input id="sp" type="password" placeholder="Пароль (мин. 8)" autocomplete="new-password" /></div>
      <div class="row"><input id="sc" type="password" placeholder="Повторите пароль" autocomplete="new-password" /></div>
      <div class="row"><button class="p" onclick="setup()">Создать администратора</button><span class="err" id="serr"></span></div>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="hide">
    <h1>Alpha Access — вход</h1>
    <div class="card">
      <div class="row"><input id="lu" placeholder="Логин" autocomplete="username" /></div>
      <div class="row"><input id="lp" type="password" placeholder="Пароль" autocomplete="current-password" /></div>
      <div class="row"><button class="p" onclick="login()">Войти</button><span class="err" id="lerr"></span></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hide">
    <div class="row">
      <h1 style="margin:0">Alpha Access — администрирование</h1>
      <span class="muted" id="who"></span>
      <input id="filter" placeholder="фильтр по email" oninput="render()" style="width:220px" />
      <button onclick="load()">Обновить</button>
      <button class="d" onclick="logout()">Выйти</button>
    </div>
    <table><thead><tr><th>email</th><th>статус</th><th>создано</th><th>одобрено</th><th>код</th><th>устройства</th><th>действия</th></tr></thead><tbody id="rows"></tbody></table>

    <details>
      <summary>Настройки администратора</summary>
      <div class="card" style="margin-top:12px">
        <div class="row"><input id="cu" placeholder="Новый логин (необязательно)" /></div>
        <div class="row"><input id="cp" type="password" placeholder="Новый пароль (мин. 6)" /></div>
        <div class="row"><input id="cc" type="password" placeholder="Текущий пароль" /></div>
        <div class="row"><button class="p" onclick="changeCreds()">Сохранить</button><span class="err" id="cerr"></span></div>
      </div>
    </details>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  let DATA = { requests: [], devices: [] };
  async function api(path, method='GET', body) {
    const r = await fetch(path, { method, headers:{'content-type':'application/json'}, credentials:'same-origin', body: body?JSON.stringify(body):undefined });
    return { status:r.status, json: await r.json().catch(()=>({})) };
  }
  function show(which) { for (const id of ['setup','login','app']) $(id).classList.toggle('hide', id !== which); }
  async function boot() {
    const st = await api('/api/alpha/admin/setup-status');
    if (st.status === 200 && st.json.needs_setup) { show('setup'); return; }
    const me = await api('/api/alpha/admin/me');
    if (me.status === 200) { $('who').textContent = me.json.user; show('app'); load(); }
    else show('login');
  }
  async function setup() {
    $('serr').textContent='';
    const r = await api('/api/alpha/admin/setup','POST',{ user:$('su').value, password:$('sp').value, confirm:$('sc').value });
    if (r.status === 200) boot();
    else $('serr').textContent = r.json.error === 'password_mismatch' ? 'Пароли не совпадают'
      : r.json.error === 'weak_password' ? 'Пароль слишком короткий (мин. 8)'
      : r.json.error === 'weak_user' ? 'Логин слишком короткий (мин. 3)'
      : r.json.error === 'already_initialized' ? 'Администратор уже создан' : 'Ошибка';
  }
  async function login() {
    $('lerr').textContent='';
    const r = await api('/api/alpha/admin/login','POST',{ user:$('lu').value, password:$('lp').value });
    if (r.status === 200) boot(); else $('lerr').textContent = 'Неверный логин или пароль';
  }
  async function logout() { await api('/api/alpha/admin/logout','POST'); boot(); }
  async function changeCreds() {
    $('cerr').textContent='';
    const r = await api('/api/alpha/admin/change-credentials','POST',{ new_user:$('cu').value||undefined, new_password:$('cp').value||undefined, current_password:$('cc').value });
    if (r.status === 200) { alert('Сохранено. Войдите снова.'); boot(); }
    else $('cerr').textContent = r.json.error === 'wrong_current_password' ? 'Неверный текущий пароль' : (r.json.error === 'weak_credentials' ? 'Пароль слишком короткий' : 'Ошибка');
  }
  async function load() { const j = await api('/api/alpha/admin/list'); if (j.status===200){ DATA=j.json; render(); } else boot(); }
  function statusLabel(r, activeCount) {
    if (r.status === 'pending') return ['pending', 'Ожидает подтверждения'];
    if (r.status === 'revoked') return ['revoked', 'Отключён'];
    if (r.status === 'denied') return ['denied', 'Отклонён'];
    if (r.status === 'approved' && activeCount > 0) return ['active', 'Активирован'];
    if (r.status === 'approved') return ['approved', 'Одобрен'];
    return [r.status, r.status];
  }
  function render() {
    const f = $('filter').value.trim().toLowerCase();
    const byEmail = {}; for (const d of DATA.devices) (byEmail[d.email_normalized]=byEmail[d.email_normalized]||[]).push(d);
    $('rows').innerHTML = DATA.requests.filter(r=>!f||r.email_normalized.includes(f)).map(r=>{
      const devs=(byEmail[r.email_normalized]||[]); const active=devs.filter(d=>d.status==='active').length;
      const [cls, label] = statusLabel(r, active);
      return `<tr><td>${r.email_normalized}</td><td><span class="s ${cls}">${label}</span></td>
        <td class="muted">${(r.created_at||'').slice(0,16).replace('T',' ')}</td><td class="muted">${(r.approved_at||'').slice(0,16).replace('T',' ')}</td>
        <td>${r.has_code?(r.code_used?'<span class="muted">использован</span>':'выдан'):'—'}</td><td>${active}/${devs.length}</td>
        <td><button class="p" onclick="approve('${r.email_normalized}')">Одобрить и выдать код</button>
        <button class="d" onclick="act('deny','${r.email_normalized}')">Отклонить</button>
        <button class="d" onclick="act('revoke','${r.email_normalized}')">Отключить доступ</button></td></tr>`;
    }).join('');
  }
  async function approve(email){ const j=await api('/api/alpha/admin/approve','POST',{email}); if(j.json.activation_code) alert('Код для '+email+':\n\n'+j.json.activation_code+'\n\nКод показывается только один раз. Скопируйте его и передайте пользователю.\n\nДействует '+j.json.ttl_minutes+' мин.'); load(); }
  async function act(kind,email){ await api('/api/alpha/admin/'+kind,'POST',{email}); load(); }
  boot();
</script>
</body>
</html>
